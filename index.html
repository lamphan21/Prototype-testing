<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Lead Noti – Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Reddit Sans', sans-serif;
      background: #f7f7f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 16px;
    }

    .label {
      font-size: 13px;
      font-weight: 500;
      color: #8c8c8c;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(34,34,34,.08);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 360px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #222;
      text-align: center;
      line-height: 1.3;
    }

    .card-sub {
      font-size: 13px;
      color: #8c8c8c;
      text-align: center;
      margin-top: -16px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1.5px solid #e8e8e8;
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      color: #222;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      transition: background .15s, border-color .15s, transform .1s;
    }

    .btn:hover {
      background: #fffdf5;
      border-color: #ffd400;
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #ffd400;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon.blue {
      background: #e8f0fc;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: left;
    }

    .btn-title {
      font-size: 15px;
      font-weight: 600;
      color: #222;
    }

    .btn-desc {
      font-size: 12px;
      font-weight: 400;
      color: #8c8c8c;
    }

    .badge {
      margin-left: auto;
      background: #ffd400;
      color: #222;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .badge.blue {
      background: #306bd9;
      color: #fff;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #f4f4f4;
    }

    .version {
      font-size: 11px;
      color: #c0c0c0;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo / Title -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:52px;height:52px;background:#ffd400;border-radius:14px;display:flex;align-items:center;justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M4 6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2H9l-5 4V6z" fill="#222"/>
        </svg>
      </div>
      <span class="card-title">Chat Lead Noti</span>
      <span class="card-sub">Chọn màn hình prototype</span>
    </div>

    <div class="divider"></div>

    <div class="btn-group">

      <!-- Tab Tin nhắn -->
      <a class="btn" href="chat-tin-nhan-tab.html">
        <div class="btn-icon blue">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M3 4a2 2 0 012-2h12a2 2 0 012 2v9a2 2 0 01-2 2H7l-4 3V4z"
              stroke="#306bd9" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Tab Tin nhắn</span>
          <span class="btn-desc">Danh sách hội thoại</span>
        </div>
        <svg class="badge" style="background:none;" width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M1 1l5 5-5 5" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <!-- Tab Khách -->
      <a class="btn" href="chat-khach-tab.html">
        <div class="btn-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="8" r="3.5" stroke="#222" stroke-width="1.5" fill="none"/>
            <path d="M3.5 19c0-4 3.4-7 7.5-7s7.5 3 7.5 7"
              stroke="#222" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Tab Khách</span>
          <span class="btn-desc">Quản lý khách hàng tiềm năng</span>
        </div>
        <svg style="background:none;" width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M1 1l5 5-5 5" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

    </div>

    <span class="version">Prototype v1.0 · 2026</span>

  </div>

</body>
</html>
