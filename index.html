<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Reddit Sans', sans-serif;
      background: #f7f7f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 16px;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(34,34,34,.09);
      padding: 36px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 400px;
    }

    .card-title {
      padding-bottom: 16px
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 56px; height: 56px;
      background: #ffd400;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #222;
    }

    .card-sub {
      font-size: 13px;
      color: #8c8c8c;
    }

    /* ── Platform buttons row ─────────────────────────────── */
    .platform-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .platform-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      border-radius: 14px;
      border: 1.5px solid #e8e8e8;
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      color: #222;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .1s, box-shadow .15s;
      position: relative;
    }

    .platform-btn:hover:not(.disabled) {
      background: #fffdf5;
      border-color: #ffd400;
      box-shadow: 0 4px 16px rgba(255,212,0,.2);
    }

    .platform-btn:active:not(.disabled) {
      transform: scale(.97);
    }

    .platform-btn.disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .platform-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      background: #f4f4f4;
    }

    .platform-btn:not(.disabled) .platform-icon {
      background: #fff8cc;
    }

    .platform-name {
      font-size: 15px;
      font-weight: 700;
      color: #222;
    }

    .platform-desc {
      font-size: 11px;
      color: #8c8c8c;
      font-weight: 400;
    }

    .coming-soon {
      position: absolute;
      top: 10px; right: 10px;
      background: #f4f4f4;
      color: #8c8c8c;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
      letter-spacing: .3px;
    }

    /* ── Divider ──────────────────────────────────────────── */
    .divider {
      width: 100%;
      height: 1px;
      background: #f4f4f4;
    }

    /* ── Sub-links (shown inside Mobile expand) ───────────── */
    .sub-links {
      display: none;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .sub-links.open { display: flex; }

    .sub-label {
      font-size: 11px;
      font-weight: 600;
      color: #8c8c8c;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 0 2px;
    }

    .sub-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid #e8e8e8;
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      color: #222;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .1s;
    }

    .sub-btn:hover {
      background: #fffdf5;
      border-color: #ffd400;
    }

    .sub-btn:active { transform: scale(.98); }

    .sub-btn-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .sub-btn-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      text-align: left;
    }

    .sub-btn-title { font-size: 14px; font-weight: 600; color: #222; }
    .sub-btn-desc  { font-size: 11px; font-weight: 400; color: #8c8c8c; }

    .chevron {
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      flex-shrink: 0;
    }
    .platform-btn.active .chevron { transform: rotate(90deg); }

    /* ── Version ──────────────────────────────────────────── */
    .version { font-size: 11px; color: #c0c0c0; }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.5994 11.9996C20.5992 7.25016 16.7483 3.40002 11.9988 3.40002C7.24944 3.40024 3.39938 7.2503 3.39917 11.9996C3.39917 16.7492 7.24931 20.6 11.9988 20.6002C13.5297 20.6002 14.9646 20.2007 16.2078 19.5016L16.2927 19.4586C16.4954 19.3688 16.7234 19.3489 16.9402 19.403L20.4001 20.2672L19.7937 16.0192C19.7673 15.8339 19.7932 15.6445 19.8689 15.4733C20.3379 14.4123 20.5994 13.2377 20.5994 11.9996ZM12.5994 12.1998L12.7009 12.2047C13.2054 12.2557 13.5993 12.682 13.5994 13.1998C13.5994 13.7178 13.2054 14.144 12.7009 14.1949L12.5994 14.1998H8.39917C7.84689 14.1998 7.39917 13.7521 7.39917 13.1998C7.39927 12.6476 7.84695 12.1998 8.39917 12.1998H12.5994ZM15.5994 7.40002L15.7009 7.40491C16.2054 7.45588 16.5994 7.88208 16.5994 8.40002C16.5994 8.91797 16.2054 9.34417 15.7009 9.39514L15.5994 9.40002H8.39917C7.84689 9.40002 7.39917 8.95231 7.39917 8.40002C7.39917 7.84774 7.84689 7.40002 8.39917 7.40002H15.5994ZM22.5994 11.9996C22.5994 13.4158 22.3169 14.7681 21.8113 16.0055L22.5906 21.4576C22.6377 21.7872 22.5175 22.1184 22.2703 22.3414C22.023 22.5643 21.6811 22.6497 21.3582 22.569L16.8289 21.4362C15.3794 22.1794 13.7369 22.6002 11.9988 22.6002C6.14474 22.6 1.39917 17.8537 1.39917 11.9996C1.39938 6.14573 6.14487 1.40024 11.9988 1.40002C17.8529 1.40002 22.5992 6.1456 22.5994 11.9996Z" fill="#222222"/>
        </svg>
      </div>
      <span class="card-title">Chat Prototype</span>
      <span class="card-sub">Chọn nền tảng prototype</span>
    </div>

    <div class="divider"></div>

    <!-- Platform buttons -->
    <div class="platform-row">

      <!-- Mobile -->
      <button class="platform-btn" id="btn-mobile" onclick="toggleMobile()">
        <div class="platform-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="6" y="2" width="12" height="20" rx="2.5" stroke="#222" stroke-width="1.5" fill="none"/>
            <circle cx="12" cy="18.5" r="1" fill="#222"/>
          </svg>
        </div>
        <span class="platform-name">Mobile</span>
        <span class="platform-desc">iOS prototype</span>
        <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5l4 4 4-4" stroke="#8c8c8c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Desktop -->
      <div class="platform-btn disabled">
        <span class="coming-soon">Sắp có</span>
        <div class="platform-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="4" width="20" height="13" rx="2" stroke="#8c8c8c" stroke-width="1.5" fill="none"/>
            <path d="M8 20h8M12 17v3" stroke="#8c8c8c" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="platform-name">Desktop</span>
        <span class="platform-desc">Web prototype</span>
      </div>

    </div>

    <!-- Mobile sub-links (expand on click) -->
    <div class="sub-links" id="mobile-links">
      <span class="sub-label">Chọn tab</span>

      <!-- Tab Tin nhắn -->
      <a class="sub-btn" href="chat-tin-nhan-tab.html">
        <div class="sub-btn-icon" style="background:#e8f0fc;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M2.5 4a2 2 0 012-2h11a2 2 0 012 2v8a2 2 0 01-2 2H6.5l-4 3V4z"
              stroke="#306bd9" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div class="sub-btn-text">
          <span class="sub-btn-title">Tab Tin nhắn</span>
          <span class="sub-btn-desc">Danh sách hội thoại</span>
        </div>
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M1 1l5 5-5 5" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <!-- Tab Khách -->
      <a class="sub-btn" href="chat-khach-tab.html">
        <div class="sub-btn-icon" style="background:#fff8cc;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="7" r="3" stroke="#222" stroke-width="1.4" fill="none"/>
            <path d="M3 17c0-3.5 3-6 7-6s7 2.5 7 6"
              stroke="#222" stroke-width="1.4" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="sub-btn-text">
          <span class="sub-btn-title">Tab Khách</span>
          <span class="sub-btn-desc">Quản lý khách hàng tiềm năng</span>
        </div>
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M1 1l5 5-5 5" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <span class="version">Prototype v1.0 · 2026</span>

  </div>

  <script>
    function toggleMobile() {
      const btn   = document.getElementById('btn-mobile');
      const links = document.getElementById('mobile-links');
      const isOpen = links.classList.contains('open');
      links.classList.toggle('open', !isOpen);
      btn.classList.toggle('active', !isOpen);
    }
  </script>

</body>
</html>
